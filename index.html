<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soul Ascent</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
#gameWrapper{position:relative;width:360px;height:600px;background:#000;overflow:hidden;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#ui{position:absolute;top:0;left:0;right:0;padding:8px 12px;pointer-events:none;display:flex;justify-content:space-between;align-items:flex-start;z-index:10;}
.score-box{background:rgba(0,0,0,0.78);border:1px solid #4a1a6e;padding:4px 9px;color:#c89fff;font-size:10px;letter-spacing:2px;text-transform:uppercase;transition:border-color 0.5s,color 0.5s;}
#coinDisplay{background:rgba(0,0,0,0.78);border:1px solid #c8a000;padding:4px 9px;color:#ffe080;font-size:10px;letter-spacing:2px;}
/* ── CONTRÔLES MOBILE ── */
#controls{
  position:absolute;bottom:0;left:0;right:0;
  height:90px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 10px 10px;
  z-index:15;pointer-events:none;
}
.ctrl-group{display:flex;gap:8px;align-items:flex-end;pointer-events:none;}
.ctrl-btn{
  pointer-events:all;
  background:rgba(0,0,0,0.60);
  border:1px solid rgba(140,60,200,0.6);
  color:#c89fff;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;
  user-select:none;-webkit-user-select:none;
  cursor:pointer;touch-action:none;
  font-size:20px;
  /* Taille de base */
  width:62px;height:56px;
  /* Effet de relief */
  box-shadow:0 4px 0 rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);
  transition:background 0.08s,transform 0.08s,box-shadow 0.08s;
  -webkit-tap-highlight-color:transparent;
}
.ctrl-btn:active,.ctrl-btn.pressed{
  background:rgba(139,47,201,0.55);
  border-color:#c89fff;
  box-shadow:0 1px 0 rgba(0,0,0,0.5),0 0 14px rgba(139,47,201,0.6),inset 0 1px 0 rgba(255,255,255,0.12);
  transform:translateY(3px);
}
#jumpBtn{
  width:74px;height:66px;font-size:26px;
  border-color:rgba(180,100,255,0.7);
  background:rgba(30,0,60,0.65);
  box-shadow:0 5px 0 rgba(0,0,0,0.5),0 0 18px rgba(100,30,180,0.3),inset 0 1px 0 rgba(255,255,255,0.1);
}
#jumpBtn.pressed{
  box-shadow:0 1px 0 rgba(0,0,0,0.5),0 0 22px rgba(200,100,255,0.7),inset 0 1px 0 rgba(255,255,255,0.12);
}

/* ── OVERLAY MENU ── */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:rgba(0,0,0,0.94);z-index:20;overflow-y:auto;padding-bottom:20px;}
.menu-title{font-family:'UnifrakturMaguntia',cursive;color:#c89fff;font-size:44px;text-shadow:0 0 20px #8b2fc9,0 0 50px #8b2fc9;margin-top:28px;margin-bottom:4px;}
.menu-sub{color:#7a5a9a;font-size:10px;letter-spacing:4px;margin-bottom:20px;}
.menu-wallet{background:rgba(200,160,0,0.12);border:1px solid #c8a000;padding:6px 18px;color:#ffe080;font-size:13px;letter-spacing:2px;margin-bottom:18px;}
.obtn{background:none;border:1px solid #8b2fc9;color:#c89fff;padding:9px 26px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;margin:4px;}
.obtn:hover{background:#8b2fc9;box-shadow:0 0 16px #8b2fc9;}
.obtn.gold{border-color:#c8a000;color:#ffe080;}
.obtn.gold:hover{background:#8a6a00;}

/* ── SHOP ── */
#shopPanel{width:100%;padding:0 14px;}
.shop-title{font-family:'UnifrakturMaguntia',cursive;color:#ffe080;font-size:26px;text-align:center;margin:12px 0 14px;text-shadow:0 0 12px #c8a000;}
.skin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;}
.skin-card{background:rgba(255,255,255,0.03);border:1px solid #2a1a3a;padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:border-color .2s,background .2s;position:relative;}
.skin-card:hover{background:rgba(138,47,201,0.1);border-color:#8b2fc9;}
.skin-card.owned{border-color:#3a8a3a;}
.skin-card.selected{border-color:#ffe080;background:rgba(200,160,0,0.08);}
.skin-card canvas{image-rendering:pixelated;}
.skin-name{color:#c89fff;font-size:9px;letter-spacing:2px;text-align:center;}
.skin-price{color:#ffe080;font-size:9px;}
.skin-badge{position:absolute;top:4px;right:4px;font-size:8px;padding:2px 4px;}
.badge-owned{background:#1a4a1a;color:#88cc88;border:1px solid #3a8a3a;}
.badge-sel{background:#3a3000;color:#ffe080;border:1px solid #c8a000;}
.back-btn{margin-top:14px;}
.daily-card{border-color:#3a2a00!important;}
.daily-card.owned{border-color:#8a6a00!important;}
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas" width="360" height="600"></canvas>
  <div id="ui">
    <div class="score-box" id="scoreDisplay">ÂME : 0</div>
    <div id="coinDisplay">✦ 0</div>
    <div class="score-box" id="zoneDisplay">CIMETIÈRE</div>
  </div>
  <div id="controls">
    <!-- Boutons gauche/droite à gauche -->
    <div class="ctrl-group">
      <button class="ctrl-btn" id="leftBtn">◀</button>
      <button class="ctrl-btn" id="rightBtn">▶</button>
    </div>
    <!-- Bouton saut à droite -->
    <div class="ctrl-group">
      <button class="ctrl-btn" id="jumpBtn">↑</button>
    </div>
  </div>
  <div id="overlay"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════════
function saveData(){try{localStorage.setItem('soulascent',JSON.stringify({coins:wallet,owned:ownedSkins,selected:selectedSkin,hi:highScore,lastLogin:lastLoginDay,streak:loginStreak}));}catch(e){}}
function loadData(){try{const d=JSON.parse(localStorage.getItem('soulascent')||'{}');wallet=d.coins||0;ownedSkins=d.owned||['default'];selectedSkin=d.selected||'default';highScore=d.hi||0;lastLoginDay=d.lastLogin||'';loginStreak=d.streak||0;}catch(e){wallet=0;ownedSkins=['default'];selectedSkin='default';highScore=0;lastLoginDay='';loginStreak=0;}}

// ── DAILY LOGIN ──────────────────────────────────────────────────────────
// Les 4 skins journaliers débloqués après N jours consécutifs
const DAILY_REWARDS=[
  {day:1, skinId:'cendre',  name:'Âme Cendrée',   desc:'Connexion jour 1'},
  {day:3, skinId:'corail',  name:'Âme Corail',    desc:'Connexion jour 3'},
  {day:7, skinId:'spectre', name:'Spectre Ancien', desc:'Connexion jour 7'},
  {day:14,skinId:'seraph',  name:'Séraphin',       desc:'Connexion jour 14'},
];
let lastLoginDay='', loginStreak=0;

function getTodayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}
function getYestStr(){
  const d=new Date(Date.now()-86400000);
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

// Appelé au démarrage — renvoie la liste des skins nouvellement débloqués
function checkDailyLogin(){
  const today=getTodayStr();
  if(lastLoginDay===today) return []; // déjà connecté aujourd'hui
  const yest=getYestStr();
  if(lastLoginDay===yest) loginStreak++;      // jour consécutif
  else loginStreak=1;                          // streak cassé ou premier jour
  lastLoginDay=today;
  // Débloquer les skins correspondants
  const unlocked=[];
  for(const r of DAILY_REWARDS){
    if(loginStreak>=r.day && !ownedSkins.includes(r.skinId)){
      ownedSkins.push(r.skinId);
      unlocked.push(r);
    }
  }
  saveData();
  return unlocked;
}

// ═══════════════════════════════════════════════════════════════════
// SKINS — 16 fantômes (12 achetables + 4 journaliers)
// ═══════════════════════════════════════════════════════════════════
const SKINS={
  // ── ACHETABLES ──────────────────────────────────────────────────
  default: {name:'Âme Perdue',   price:0,   body:'#e8d8ff',dark:'#b898e8',eye:'#1a0a2e',blush:'#d080ff',glow:'#c89fff'},
  rouge:   {name:'Âme Rouge',    price:80,  body:'#ffd0d0',dark:'#e88888',eye:'#1a0000',blush:'#ff6060',glow:'#ff8888'},
  vert:    {name:'Âme Verte',    price:80,  body:'#c8ffcc',dark:'#80cc88',eye:'#001a04',blush:'#60ff80',glow:'#88ff99'},
  bleu:    {name:'Âme Bleue',    price:80,  body:'#c8e8ff',dark:'#88aaee',eye:'#00061a',blush:'#60aaff',glow:'#88ccff'},
  rose:    {name:'Âme Rose',     price:100, body:'#ffc8e8',dark:'#e880b8',eye:'#1a000e',blush:'#ff80cc',glow:'#ffaadd'},
  limon:   {name:'Âme Citronne', price:100, body:'#f8ffc0',dark:'#c8d860',eye:'#0a0c00',blush:'#d8f040',glow:'#e8ff80'},
  orange:  {name:'Âme Ardente',  price:120, body:'#ffe0b0',dark:'#e88840',eye:'#180800',blush:'#ff9030',glow:'#ffaa60'},
  glace:   {name:'Âme Glacée',   price:150, body:'#d8f8ff',dark:'#88d8f0',eye:'#001820',blush:'#60e0ff',glow:'#a0eeff'},
  or:      {name:'Âme Dorée',    price:200, body:'#fff0a0',dark:'#d4aa44',eye:'#180e00',blush:'#ffc000',glow:'#ffe080'},
  noir:    {name:'Âme Noire',    price:200, body:'#303030',dark:'#181818',eye:'#ff0000',blush:'#660000',glow:'#440000'},
  arc:     {name:'Âme Prisma',   price:350, body:'#ffccff',dark:'#cc88ff',eye:'#100018',blush:'#ff88ff',glow:'#ff88ff',rainbow:true},
  divin:   {name:'Âme Divine',   price:500, body:'#fffff0',dark:'#eeeecc',eye:'#000820',blush:'#ffffaa',glow:'#ffffc0',halo:true},
  // ── JOURNALIERS (connexion quotidienne) ─────────────────────────
  cendre:  {name:'Âme Cendrée',  price:-1,  body:'#c8c0c0',dark:'#888080',eye:'#1a1818',blush:'#aaa0a0',glow:'#d0c8c8', daily:true, dayReq:1},
  corail:  {name:'Âme Corail',   price:-1,  body:'#ffc8b0',dark:'#e08060',eye:'#1a0800',blush:'#ff9080',glow:'#ffb090', daily:true, dayReq:3},
  spectre: {name:'Spectre Ancien',price:-1, body:'#c0ffc0',dark:'#60cc60',eye:'#001800',blush:'#80ff80',glow:'#a0ffa0', daily:true, dayReq:7,  spectre:true},
  seraph:  {name:'Séraphin',     price:-1,  body:'#fff8e0',dark:'#f8d880',eye:'#180e00',blush:'#ffe890',glow:'#ffffc0', daily:true, dayReq:14, halo:true, wings:true},
};
const SHOP_ORDER =['default','rouge','vert','bleu','rose','limon','orange','glace','or','noir','arc','divin'];
const DAILY_ORDER=['cendre','corail','spectre','seraph'];

let wallet=0,ownedSkins=['default'],selectedSkin='default',highScore=0;
loadData();

// ═══════════════════════════════════════════════════════════════════
// CANVAS + CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const W=360,H=600;

// ═══════════════════════════════════════════════════════════════════
// ZONES
// ═══════════════════════════════════════════════════════════════════
const ZONES=[
  // CIMETIÈRE — violet-noir profond, lune pâle, brume violette
  {name:'CIMETIÈRE', minScore:0,
   skyTop:'#0a0018',skyBot:'#1a0830',skyMid:'#120520',
   fogCol:'rgba(80,20,140,0.22)',fogCol2:'rgba(40,0,80,0.15)',
   pTop:'#3a2a2a',pBody:'#241818',pEdge:'#0f0808',
   accent:'#9a4abf',starCol:'#d8aaff',deco:'grave',
   moon:true, moonCol:'#ddc8ff', moonX:0.78, moonY:0.12, moonR:22,
   groundFog:true, groundFogCol:'rgba(60,10,100,0.35)'},

  // PURGATOIRE — rouge sang, braises, ciel cramoisi
  {name:'PURGATOIRE',minScore:900,
   skyTop:'#150005',skyBot:'#3a0010',skyMid:'#250008',
   fogCol:'rgba(180,10,40,0.20)',fogCol2:'rgba(100,0,20,0.18)',
   pTop:'#5a1020',pBody:'#380a14',pEdge:'#200008',
   accent:'#ee2244',starCol:'#ff9090',deco:'purga',
   embers:true,
   groundFog:true, groundFogCol:'rgba(160,0,30,0.30)'},

  // LIMBES — bleu abyssal, vide cosmique, étoiles froides
  {name:'LIMBES',    minScore:2400,
   skyTop:'#000018',skyBot:'#000838',skyMid:'#000428',
   fogCol:'rgba(0,30,120,0.22)',fogCol2:'rgba(0,10,60,0.18)',
   pTop:'#1a1a5a',pBody:'#0a0a38',pEdge:'#040420',
   accent:'#3366ee',starCol:'#aaccff',deco:'limbo',
   nebula:true,
   groundFog:true, groundFogCol:'rgba(0,20,100,0.28)'},

  // CIEUX — violet mystique, nuages lumineux, étoiles dorées
  {name:'CIEUX',     minScore:4200,
   skyTop:'#100820',skyBot:'#28183c',skyMid:'#1c1030',
   fogCol:'rgba(100,60,200,0.22)',fogCol2:'rgba(60,30,130,0.18)',
   pTop:'#483068',pBody:'#301a4c',pEdge:'#180c28',
   accent:'#cc88ff',starCol:'#eeddff',deco:'cieux',
   aurora:true,
   groundFog:true, groundFogCol:'rgba(80,40,180,0.25)'},

  // PARADIS — or céleste, blanc lumineux, soleil divin
  {name:'PARADIS',   minScore:6000,
   skyTop:'#181020',skyBot:'#382c18',skyMid:'#281c14',
   fogCol:'rgba(255,210,80,0.16)',fogCol2:'rgba(200,160,40,0.12)',
   pTop:'#6a5a30',pBody:'#48401a',pEdge:'#282008',
   accent:'#ffcc00',starCol:'#fff8a0',deco:'para',
   divineLight:true,
   groundFog:true, groundFogCol:'rgba(200,160,0,0.18)'},
];
function getZoneIdx(s){for(let i=ZONES.length-1;i>=0;i--){if((s!=null?s:score)>=ZONES[i].minScore)return i;}return 0;}
function lerpColor(a,b,t){
  if(!a||!b)return a||b||'#000';
  const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
  const ar=(ah>>16)&255,ag=(ah>>8)&255,ab=ah&255;
  const br=(bh>>16)&255,bg=(bh>>8)&255,bb=bh&255;
  return '#'+[ar+(br-ar)*t,ag+(bg-ag)*t,ab+(bb-ab)*t].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
}

// ═══════════════════════════════════════════════════════════════════
// WORLD COORDS
// ═══════════════════════════════════════════════════════════════════
let camWorldY=H;
const START_WY=H;
function toScreen(wy){return wy-camWorldY+H;}

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let score=0,gameRunning=false,gameOver=false;
let sessionCoins=0; // coins earned this run

// ═══════════════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════════════
const particles=[];
function spawnP(x,y,col,n=4,vym=2){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*2,vy:-Math.random()*vym-.3,life:1,col,size:Math.random()*3+1});
}
function tickP(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=.025;if(p.life<=0)particles.splice(i,1);}}
function drawP(){particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.fillRect(~~p.x,~~p.y,~~p.size+1,~~p.size+1);});ctx.globalAlpha=1;}

// ═══════════════════════════════════════════════════════════════════
// STARS
// ═══════════════════════════════════════════════════════════════════
const STARS=Array.from({length:180},()=>({wx:Math.random()*W,wy:-(Math.random()*24000),s:Math.random()<.2?2:1,twinkle:Math.random()*Math.PI*2,spd:.015+Math.random()*.035}));

// Braises (Purgatoire)
const EMBER_COLS=['#ff4400','#ff6600','#ff8800','#ffaa00','#ff2200'];
const EMBERS=Array.from({length:60},()=>({
  x:Math.random()*W, y:Math.random()*H,
  spd:0.3+Math.random()*0.8,
  phase:Math.random()*Math.PI*2,
  s:Math.random()<0.4?2:1,
  col:EMBER_COLS[~~(Math.random()*EMBER_COLS.length)]
}));

// Nébuleuses (Limbes) — ancrées dans le monde
const NEBULA_COLS=['rgba(20,50,200,1)','rgba(50,20,180,1)','rgba(0,80,160,1)','rgba(30,10,150,1)'];
const NEBULAS=Array.from({length:18},()=>({
  x:20+Math.random()*(W-40),
  wy:-(Math.random()*20000),
  r:40+Math.random()*70,
  phase:Math.random()*Math.PI*2,
  col:NEBULA_COLS[~~(Math.random()*NEBULA_COLS.length)]
}));

// ═══════════════════════════════════════════════════════════════════
// DECORS
// ═══════════════════════════════════════════════════════════════════
const decos=[];
let nextDecoWY=H-200;
function seedDecos(from,to){
  for(let wy=from;wy>to;wy-=90+Math.random()*80){
    const s=Math.max(0,~~((START_WY-wy)*.55));
    const zi=getZoneIdx(s);
    decos.push({wy,x:15+Math.random()*(W-70),type:ZONES[zi].deco,v:~~(Math.random()*4)});
  }
}

// ═══════════════════════════════════════════════════════════════════
// COINS IN WORLD
// ═══════════════════════════════════════════════════════════════════
const coins=[];
function spawnCoin(x,wy){
  // Centré sur la plateforme, flottant à 24px au-dessus
  coins.push({x:x+(54/2)-8, wy:wy-28, collected:false, anim:Math.random()*Math.PI*2});
}
function tickCoins(){
  const gsx=ghost.x,gsy=toScreen(ghost.wy);
  for(const c of coins){
    if(c.collected)continue;
    c.anim=(c.anim||0)+0.08;
    const csx=c.x,csy=toScreen(c.wy)+Math.sin(c.anim)*4;
    // Pickup hitbox
    if(Math.abs(gsx+ghost.w/2-csx-6)<18&&Math.abs(gsy+ghost.h/2-csy-6)<18){
      c.collected=true;
      sessionCoins++;wallet++;
      spawnP(csx+6,csy+6,'#ffe080',6,2.5);
      spawnP(csx+6,csy+6,'#ffcc00',4,1.5);
    }
  }
}
function drawCoins(){
  const t=Date.now();
  for(const c of coins){
    if(c.collected)continue;
    c.anim+=0.07;
    const bob=Math.sin(c.anim)*5;
    const sy=~~(toScreen(c.wy)+bob);
    if(sy<-30||sy>H+30)continue;
    const sx=~~c.x;
    const pulse=0.85+0.15*Math.sin(t*.005+c.x*.05);

    // ── Halo externe lumineux ──────────────────────────────
    ctx.save();
    ctx.globalAlpha=(0.18+0.12*Math.sin(t*.004))*pulse;
    ctx.fillStyle='#ffe080';
    ctx.beginPath();ctx.arc(sx+8,sy+8,13,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.restore();

    // ── Pièce pixel art 16×16 (px=2) ──────────────────────
    // Fond sombre de la pièce (cerclage)
    ctx.globalAlpha=pulse;
    const ring=[
      '00111100',
      '01111110',
      '11111111',
      '11111111',
      '11111111',
      '11111111',
      '01111110',
      '00111100',
    ];
    const inner=[
      '________',
      '________',
      '__1111__',
      '__1__1__',
      '__1__1__',
      '__1111__',
      '________',
      '________',
    ];
    // Couleur anneau
    ring.forEach((row,ry)=>{
      for(let rx=0;rx<8;rx++){
        if(row[rx]==='1'){
          // Dégradé: haut=clair, bas=foncé
          const shade=ry<4?'#ffe080':'#cc9900';
          ctx.fillStyle=shade;
          ctx.fillRect(sx+rx*2,sy+ry*2,2,2);
        }
      }
    });
    // Symbole ✦ au centre (blanc)
    ctx.fillStyle='#fffac0';
    ctx.fillRect(sx+7,sy+4,2,8);  // barre v
    ctx.fillRect(sx+4,sy+7,8,2);  // barre h
    ctx.fillRect(sx+6,sy+5,4,6);  // centre épais
    ctx.fillRect(sx+5,sy+6,6,4);
    // Brillance coin haut-gauche
    ctx.fillStyle='#ffffff';
    ctx.fillRect(sx+4,sy+3,2,2);
    ctx.fillRect(sx+3,sy+4,2,2);
    ctx.globalAlpha=1;

    // ── Particules flottantes autour ──────────────────────
    for(let i=0;i<3;i++){
      const angle=t*.002+c.anim+i*(Math.PI*2/3);
      const px=sx+8+Math.cos(angle)*10;
      const py=sy+8+Math.sin(angle)*6;
      ctx.globalAlpha=0.5+0.4*Math.sin(t*.006+i);
      ctx.fillStyle='#ffe080';
      ctx.fillRect(~~px,~~py,2,2);
    }

}

// ═══════════════════════════════════════════════════════════════════
// GHOST
// ═══════════════════════════════════════════════════════════════════
const ghost={x:W/2-9,wy:H-140,vx:0,vy:0,w:18,h:20,frame:0,ft:0,trail:[],inv:0,won:false};

function drawGhost(sx,sy,frame,inv){
  const sk=SKINS[selectedSkin]||SKINS.default;
  const ox=~~sx,oy=~~sy;
  const t=Date.now();

  // Rainbow effect
  let body=sk.body,dark=sk.dark,glow=sk.glow;
  if(sk.rainbow){
    const h=((t*.05)%360)/360;
    body=`hsl(${~~(h*360)},90%,85%)`;
    dark=`hsl(${~~(h*360+30)%360},80%,65%)`;
    glow=`hsl(${~~(h*360+60)%360},90%,75%)`;
  }

  // Ailes (Séraphin)
  if(sk.wings){
    const wf=0.4+0.25*Math.sin(t*.004);
    ctx.save();ctx.globalAlpha=wf;
    ctx.fillStyle='#fff8e0';
    // aile gauche
    ctx.beginPath();ctx.moveTo(ox-2,oy+8);ctx.lineTo(ox-18,oy+2+Math.sin(t*.003)*4);ctx.lineTo(ox-12,oy+18);ctx.closePath();ctx.fill();
    // aile droite
    ctx.beginPath();ctx.moveTo(ox+20,oy+8);ctx.lineTo(ox+36,oy+2+Math.sin(t*.003)*4);ctx.lineTo(ox+30,oy+18);ctx.closePath();ctx.fill();
    ctx.globalAlpha=wf*0.5;ctx.fillStyle='#ffe080';
    ctx.beginPath();ctx.moveTo(ox-2,oy+8);ctx.lineTo(ox-14,oy+4+Math.sin(t*.003)*3);ctx.lineTo(ox-8,oy+16);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(ox+20,oy+8);ctx.lineTo(ox+32,oy+4+Math.sin(t*.003)*3);ctx.lineTo(ox+26,oy+16);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // Effet spectre (traîne fantomatique verte)
  if(sk.spectre){
    ctx.save();
    for(let i=1;i<=4;i++){
      ctx.globalAlpha=(0.15-i*0.03)*(.6+.4*Math.sin(t*.005+i));
      ctx.fillStyle='#80ff80';
      ctx.beginPath();ctx.ellipse(ox+9,oy+8+i*5,10-i,12-i,0,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

  // Halo divine
  if(sk.halo){
    ctx.save();ctx.globalAlpha=0.35+0.15*Math.sin(t*.003);
    ctx.strokeStyle='#ffffaa';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(ox+9,oy-5,14,4,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // Glow
  ctx.save();ctx.globalAlpha=inv>0?0.35+0.35*Math.sin(t*.025):0.10+0.06*Math.sin(t*.004);
  ctx.fillStyle=glow;ctx.beginPath();ctx.ellipse(ox+9,oy+8,14,15,0,0,Math.PI*2);ctx.fill();ctx.restore();

  const E=sk.eye,BL=sk.blush;
  const tail=frame?['_x_xx_x__','__x__x___']:['__xxxx___','_xxxxxx__'];
  ['___xxxx___','__xxxxxx__','_xxxxxxxx_','xxxxxxxxxx','xxxxxxxxxx','xxxxxxxxxx','xxxxxxxxxx','xxxxxxxxxx','xxxxxxxxxx','xxxxxxxxxx','xxxxxxxxxx','xxxxxxxxxx','xxxxxxxxxx','xxxxxxxxxx',...tail]
  .forEach((row,ry)=>{
    for(let rx=0;rx<row.length;rx++){
      if(row[rx]==='x'){
        ctx.fillStyle=ry>10?dark:body;
        ctx.fillRect(ox+rx*2-2,oy+ry*2,2,2);
      }
    }
  });
  ctx.fillStyle=E;ctx.fillRect(ox+2,oy+8,4,4);ctx.fillRect(ox+12,oy+8,4,4);
  ctx.fillStyle='#fff';ctx.fillRect(ox+3,oy+8,2,2);ctx.fillRect(ox+13,oy+8,2,2);
  ctx.globalAlpha=.4;ctx.fillStyle=BL;ctx.fillRect(ox,oy+12,4,3);ctx.fillRect(ox+14,oy+12,4,3);
  ctx.globalAlpha=1;
}

// Mini ghost preview pour la boutique
function drawGhostMini(c2,sk,x,y,scale=1){

function randType(){
  const r=Math.random();
  if(r<.52)return'normal';if(r<.67)return'bone';if(r<.79)return'crumble';
  if(r<.89)return'spring';return'moving';

let nextPlatWY=0;

function drawPlat(p,zi){
  const z=ZONES[zi],bob=p.type==='moving'?Math.sin(Date.now()*.002+p.bob)*18:0;

  }
  if(p.type==='crumble'){
    for(let cx=0;cx<p.w;cx+=8){ctx.fillStyle=p.used?'#1a1010':'#3a2a2a';ctx.fillRect(sx+cx,sy,6,p.h);}
    ctx.strokeStyle='#111';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx+10,sy);ctx.lineTo(sx+14,sy+p.h);ctx.moveTo(sx+28,sy);ctx.lineTo(sx+24,sy+p.h);ctx.stroke();return;
  }
  if(p.type==='spring'){
    ctx.fillStyle='#1a3a1a';ctx.fillRect(sx,sy,p.w,p.h);ctx.fillStyle='#00cc44';ctx.fillRect(sx,sy,p.w,3);
    ctx.globalAlpha=.6+.3*Math.sin(Date.now()*.005);ctx.fillStyle='#00ff88';ctx.font='8px Courier New';ctx.fillText('✦ ✦ ✦',sx+6,sy+9);ctx.globalAlpha=1;return;

    ctx.strokeStyle='#6a6aaa';ctx.lineWidth=1;for(let cx=4;cx<p.w-4;cx+=8){ctx.beginPath();ctx.arc(sx+cx,sy-3,2,0,Math.PI*2);ctx.stroke();}return;
  }
  ctx.fillStyle=z.pBody;ctx.fillRect(sx,sy,p.w,p.h);ctx.fillStyle=z.pTop;ctx.fillRect(sx,sy,p.w,3);ctx.fillStyle=z.pEdge;ctx.fillRect(sx,sy+p.h-1,p.w,1);

  // Coin indicator on platform (small dot if hasCoin and coin not yet spawned to world)
  if(p.hasCoin&&!p.coinSpawned){

  }
}

// ═══════════════════════════════════════════════════════════════════
// BG
// ═══════════════════════════════════════════════════════════════════
function drawBg(zi){
  const z=ZONES[zi], nz=ZONES[Math.min(zi+1,ZONES.length-1)];
  const bl=Math.min(1,Math.max(0,(score-z.minScore)/((nz.minScore||8000)-z.minScore)));
  const t=Date.now();

  // ── Fond noir absolu (vide)
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // ── Dégradé de ciel riche sur toute la hauteur
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,  lerpColor(z.skyTop, nz.skyTop, bl));
  grad.addColorStop(0.4,lerpColor(z.skyMid, nz.skyMid, bl));
  grad.addColorStop(1,  'rgba(0,0,0,0)');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // ── EFFET SPÉCIAL PAR ZONE ──────────────────────────────

  // Lune (Cimetière)
  if(z.moon||nz.moon){
    const ma=z.moon?1:0, na=nz.moon?1:0, a=ma+(na-ma)*bl;
    if(a>0.01){
      const mx=~~(W*(z.moonX||nz.moonX||0.78)), my=~~(H*(z.moonY||nz.moonY||0.12));
      const mr=(z.moonR||nz.moonR||22);
      const mcol=lerpColor(z.moon?z.moonCol:'#000000', nz.moon?nz.moonCol:'#000000', nz.moon?bl:0);
      // Halo de lune
      ctx.globalAlpha=0.12*a;
      ctx.fillStyle=mcol;
      ctx.beginPath();ctx.arc(mx,my,mr+14,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.22*a;
      ctx.beginPath();ctx.arc(mx,my,mr+6,0,Math.PI*2);ctx.fill();
      // Corps de la lune
      ctx.globalAlpha=0.85*a;
      const lg=ctx.createRadialGradient(mx-4,my-4,2,mx,my,mr);
      lg.addColorStop(0,'#fffaff'); lg.addColorStop(0.6,mcol); lg.addColorStop(1,'rgba(180,150,220,0.4)');
      ctx.fillStyle=lg; ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();
      // Cratères pixel
      ctx.globalAlpha=0.18*a; ctx.fillStyle='#9988aa';
      ctx.fillRect(mx-8,my-4,6,4); ctx.fillRect(mx+4,my+6,4,4); ctx.fillRect(mx-2,my+2,4,3);
      ctx.globalAlpha=1;
    }
  }

  // Braises flottantes (Purgatoire)
  if(z.embers||nz.embers){
    const ea=(z.embers?1:0)+(((nz.embers?1:0)-(z.embers?1:0))*bl);
    if(ea>0.05){
      const em=EMBERS;
      em.forEach(e=>{
        e.y-=0.4+e.spd; e.x+=Math.sin(t*.001+e.phase)*0.4;
        if(e.y<-10)e.y=H+5;
        ctx.globalAlpha=(0.5+0.4*Math.sin(t*.008+e.phase))*ea;
        ctx.fillStyle=e.col; ctx.fillRect(~~e.x,~~e.y,e.s,e.s);
      });
      ctx.globalAlpha=1;
    }
  }

  // Nébuleuse (Limbes)
  if(z.nebula||nz.nebula){
    const na2=(z.nebula?1:0)+(((nz.nebula?1:0)-(z.nebula?1:0))*bl);
    if(na2>0.05){
      NEBULAS.forEach(n=>{
        const nx=n.x, ny=~~(toScreen(n.wy));
        if(ny<-120||ny>H+60)return;
        ctx.globalAlpha=(0.08+0.04*Math.sin(t*.0008+n.phase))*na2;
        const rg=ctx.createRadialGradient(nx,ny,0,nx,ny,n.r);
        rg.addColorStop(0,n.col); rg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=rg; ctx.fillRect(nx-n.r,ny-n.r,n.r*2,n.r*2);
      });
      ctx.globalAlpha=1;
    }
  }

  // Aurora borealis (Cieux)
  if(z.aurora||nz.aurora){
    const aa=(z.aurora?1:0)+(((nz.aurora?1:0)-(z.aurora?1:0))*bl);
    if(aa>0.05){
      for(let i=0;i<5;i++){
        const ax=i*(W/4)-20;
        const wave=Math.sin(t*.0006+i*1.1)*30;
        ctx.globalAlpha=(0.06+0.04*Math.sin(t*.0009+i))*aa;
        const ag=ctx.createLinearGradient(ax,0,ax+80,H*.7);
        ag.addColorStop(0,'rgba(0,0,0,0)');
        ag.addColorStop(0.3,i%2?'rgba(180,100,255,0.9)':'rgba(100,200,255,0.9)');
        ag.addColorStop(0.6,i%2?'rgba(100,200,255,0.6)':'rgba(180,100,255,0.6)');
        ag.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ag;
        ctx.save();ctx.translate(ax+wave,0);ctx.fillRect(0,0,80,H*.75);ctx.restore();
      }
      ctx.globalAlpha=1;
    }
  }

  // Lumière divine (Paradis)
  if(z.divineLight||nz.divineLight){
    const da=(z.divineLight?1:0)+(((nz.divineLight?1:0)-(z.divineLight?1:0))*bl);
    if(da>0.05){
      // Soleil central
      const sunPulse=0.5+0.12*Math.sin(t*.0015);
      ctx.globalAlpha=0.20*da*sunPulse;
      const sg=ctx.createRadialGradient(W/2,30,0,W/2,30,120);
      sg.addColorStop(0,'#ffffff'); sg.addColorStop(0.4,'#ffe080'); sg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
      // Rayons
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2+t*.0003;
        ctx.globalAlpha=0.04*da*sunPulse;
        ctx.save();ctx.translate(W/2,30);ctx.rotate(a);
        const rg2=ctx.createLinearGradient(0,0,0,H);
        rg2.addColorStop(0,'#ffe080');rg2.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=rg2;ctx.fillRect(-12,0,24,H);
        ctx.restore();
      }
      ctx.globalAlpha=1;
    }
  }

  // ── Étoiles (monde)
  STARS.forEach(s=>{
    s.twinkle+=s.spd;
    const sy=toScreen(s.wy);if(sy<-2||sy>H+2)return;
    ctx.globalAlpha=.35+.55*Math.sin(s.twinkle);
    ctx.fillStyle=lerpColor(z.starCol,nz.starCol,bl);
    ctx.fillRect(~~s.wx,~~sy,s.s,s.s);
  });ctx.globalAlpha=1;

  // ── Brume principale (couleur zone)
  for(let i=0;i<4;i++){
    const fy=(t*.009+i*180)%(H+140)-70;
    ctx.globalAlpha=.13+.05*Math.sin(t*.0007+i);
    ctx.fillStyle=z.fogCol; ctx.fillRect(0,fy,W,100);
  }
  ctx.globalAlpha=1;

  // ── Brume basse (au sol de chaque zone) — plus dense et colorée
  if(z.groundFog){
    const gfGrad=ctx.createLinearGradient(0,H*.6,0,H);
    gfGrad.addColorStop(0,'rgba(0,0,0,0)');
    gfGrad.addColorStop(0.5,z.groundFogCol);
    gfGrad.addColorStop(1,z.groundFogCol);
    ctx.globalAlpha=0.7+0.15*Math.sin(t*.0005);
    ctx.fillStyle=gfGrad; ctx.fillRect(0,H*.6,W,H*.4);
    ctx.globalAlpha=1;
  }

  // ── Décors du monde
  decos.forEach(d=>drawDeco(d));
}

const keys={left:false,right:false,jump:false};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;if(e.key==='ArrowRight'||e.key==='d')keys.right=true;if(e.key===' '||e.key==='ArrowUp'||e.key==='w'){keys.jump=true;e.preventDefault();}});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;if(e.key==='ArrowRight'||e.key==='d')keys.right=false;if(e.key===' '||e.key==='ArrowUp'||e.key==='w')keys.jump=false;});
let touchStartX=null;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
canvas.addEventListener('touchmove',e=>{if(touchStartX===null)return;const dx=e.touches[0].clientX-touchStartX;keys.left=dx<-15;keys.right=dx>15;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',()=>{keys.left=false;keys.right=false;touchStartX=null;});
function setupBtn(id,k){const b=document.getElementById(id);if(!b)return;const on=e=>{e.preventDefault();keys[k]=true;b.classList.add('pressed');};const off=e=>{e.preventDefault();keys[k]=false;b.classList.remove('pressed');};['mousedown','touchstart'].forEach(ev=>b.addEventListener(ev,on,{passive:false}));['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>b.addEventListener(ev,off,{passive:false}));}
setupBtn('leftBtn','left');setupBtn('rightBtn','right');setupBtn('jumpBtn','jump');

function initGame(){
  score=0;sessionCoins=0;gameOver=false;camWorldY=H;
  ghost.x=W/2-9;ghost.wy=H-140;ghost.vx=0;ghost.vy=0;ghost.trail=[];ghost.frame=0;ghost.ft=0;ghost.inv=0;ghost.won=false;
  plats.length=0;enemies.length=0;particles.length=0;decos.length=0;coins.length=0;
  plats.push({x:W/2-40,wy:H-80,w:80,h:12,type:'tomb',used:false,broken:false,bob:0,vx:0,hasCoin:false,coinSpawned:true});
  let wy=H-160;
  for(let i=0;i<24;i++){plats.push(mkPlat(5+Math.random()*(W-PW-10),wy,i<4?'normal':randType()));wy-=62+Math.random()*38;}
  nextPlatWY=wy;
  nextDecoWY=H-200;seedDecos(H-200,H-5000);nextDecoWY=H-5000;
  updateCoinUI();
}

function updateCoinUI(){
  document.getElementById('coinDisplay').textContent='✦ '+wallet;
}

// ═══════════════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════════════
const GRAV=0.28,JV=-9.0,BV=-13.5,MS=3.2;

function update(){
  if(!gameRunning||gameOver)return;
  if(keys.left)ghost.vx=-MS;else if(keys.right)ghost.vx=MS;else ghost.vx*=.72;
  ghost.vy+=GRAV;ghost.wy+=ghost.vy;ghost.x+=ghost.vx;
  if(ghost.x>W)ghost.x=-ghost.w;if(ghost.x<-ghost.w)ghost.x=W;
  const gsx=ghost.x,gsy=toScreen(ghost.wy);
  ghost.trail.push({x:gsx+ghost.w/2,sy:gsy+ghost.h/2});
  if(ghost.trail.length>9)ghost.trail.shift();
  ghost.ft++;if(ghost.ft>12){ghost.frame^=1;ghost.ft=0;}

  if(gsy<H*.38){const d=H*.38-gsy;camWorldY-=d;score=Math.max(score,~~((START_WY-camWorldY)*.55));}

  while(nextPlatWY>camWorldY-H-200){
    const p=mkPlat(5+Math.random()*(W-PW-10),nextPlatWY,randType());
    plats.push(p);
    if(p.hasCoin){spawnCoin(p.x,p.wy);p.coinSpawned=true;}
    if(Math.random()<.13&&score>400)mkEnemy(nextPlatWY-20);
    nextPlatWY-=62+Math.random()*38;
  }

  if(nextDecoWY>camWorldY-H-400){seedDecos(nextDecoWY,nextDecoWY-2000);nextDecoWY-=2000;}

  // ── COLLISIONS PLATEFORMES ── tout en coords monde, propre et précis
  let onGround=false;
  if(ghost.vy>0){
    const ghostBottom = ghost.wy + ghost.h;   // bas fantôme (monde)
    const prevBottom  = ghostBottom - ghost.vy; // bas tick précédent
    const ghostLeft   = ghost.x + 3;           // marge latérale
    const ghostRight  = ghost.x + ghost.w - 3;

    for(const p of plats){
      if(p.broken) continue;
      // Bob en coords monde (même formule que drawPlat)
      const bobWY   = p.type==='moving' ? Math.sin(Date.now()*.002+p.bob)*18 : 0;
      const platTop = p.wy + bobWY;

      // Rejet rapide horizontal
      if(ghostRight  <= p.x)         continue;
      if(ghostLeft   >= p.x + p.w)   continue;
      // Le bas du fantôme doit avoir traversé le dessus de la plateforme CE tick
      if(prevBottom  >  platTop + p.h) continue; // venait déjà d'en dessous
      if(ghostBottom <  platTop)       continue; // pas encore touché
      if(ghostBottom >  platTop + p.h + 2) continue; // trop enfoncé = fantôme passe au travers

      // Recolle exactement sur la surface
      ghost.wy = platTop - ghost.h;

      if(p.hasCoin&&!p.coinSpawned){spawnCoin(p.x,p.wy);p.coinSpawned=true;}
      if(p.type==='crumble'){
        if(!p.used){p.used=true;setTimeout(()=>{p.broken=true;},300);}
        ghost.vy=JV;
      } else if(p.type==='spring'){
        ghost.vy=BV;
        spawnP(ghost.x+9, toScreen(ghost.wy+ghost.h), '#00ff88', 8);
      } else {
        ghost.vy=JV;
      }
      onGround=true;
      spawnP(ghost.x+Math.random()*ghost.w, toScreen(ghost.wy+ghost.h), '#c89fff', 3);
      break;
    }
  }
  if(keys.jump&&onGround){ghost.vy=BV;spawnP(ghost.x+9,toScreen(ghost.wy+ghost.h),'#c89fff',8);}

  plats.forEach(p=>{if(p.type==='moving'){p.x+=p.vx;if(p.x<5||p.x>W-p.w-5)p.vx*=-1;}});

  enemies.forEach(e=>{
    e.x+=e.vx;if(e.x<0||e.x>W-e.w)e.vx*=-1;
    e.ft++;if(e.ft>6){e.frame=(e.frame+1)%8;e.ft=0;}
    if(ghost.inv<=0){const esy=toScreen(e.wy);if(ghost.x<e.x+e.w&&ghost.x+ghost.w>e.x&&gsy<esy+e.h&&gsy+ghost.h>esy){ghost.vy=JV;ghost.inv=90;score=Math.max(0,score-120);spawnP(ghost.x+9,gsy+9,'#ff3030',12);}}
  });
  if(ghost.inv>0)ghost.inv--;

  tickCoins();
  tickP();

  while(plats.length>0&&toScreen(plats[0].wy)>H+130)plats.shift();
  for(let i=enemies.length-1;i>=0;i--){if(toScreen(enemies[i].wy)>H+70)enemies.splice(i,1);}
  for(let i=decos.length-1;i>=0;i--){if(toScreen(decos[i].wy)>H+220)decos.splice(i,1);}
  for(let i=coins.length-1;i>=0;i--){if(coins[i].collected||toScreen(coins[i].wy)>H+80)coins.splice(i,1);}

  updateCoinUI();
  if(toScreen(ghost.wy)>H+80)endGame();
  if(score>=7500&&!ghost.won){ghost.won=true;setTimeout(showWin,1200);}
}

function endGame(){
  gameOver=true;gameRunning=false;highScore=Math.max(highScore,score);
  saveData();showGameOver();
}

// ═══════════════════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,H);
  const zi=getZoneIdx();drawBg(zi);
  ghost.trail.forEach((tr,i)=>{ctx.globalAlpha=(i/ghost.trail.length)*.18;ctx.fillStyle='#c89fff';ctx.fillRect(~~(tr.x-4),~~(tr.sy-4),8,8);});ctx.globalAlpha=1;
  plats.forEach(p=>drawPlat(p,zi));
  drawCoins();
  enemies.forEach(e=>drawEnemy(e));
  const gsy=toScreen(ghost.wy);
  if(ghost.inv===0||~~(ghost.inv/6)%2===0)drawGhost(ghost.x,gsy,ghost.frame,ghost.inv);
  drawP();
  const vig=ctx.createRadialGradient(W/2,H/2,H*.18,W/2,H/2,H*.82);
  vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  const z=ZONES[zi];
  document.getElementById('scoreDisplay').textContent='ÂME : '+score;
  document.getElementById('zoneDisplay').textContent=z.name;
  document.getElementById('zoneDisplay').style.borderColor=z.accent;
  document.getElementById('zoneDisplay').style.color=z.accent;
  document.getElementById('scoreDisplay').style.borderColor=z.accent;
  const nz=ZONES[Math.min(zi+1,ZONES.length-1)],zS=z.minScore,zE=nz.minScore||8000;
  const prog=Math.min(1,(score-zS)/(zE-zS)),bH=H-90;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W-15,42,5,bH);
  ctx.fillStyle=z.accent;ctx.fillRect(W-15,42+bH*(1-prog),5,bH*prog);
  ctx.strokeStyle='#ffffff15';ctx.lineWidth=1;ctx.strokeRect(W-15,42,5,bH);
}

function loop(){update();draw();requestAnimationFrame(loop);}

function skinCard(id, extraClass=''){
  const sk=SKINS[id];
  const owned=ownedSkins.includes(id);
  const sel=selectedSkin===id;
  const isDaily=sk.daily;

  let badge='';
  if(sel)       badge='<span class="skin-badge badge-sel">ÉQUIPÉ</span>';
  else if(owned) badge='<span class="skin-badge badge-owned">ACQUIS</span>';

  let btn='';
  if(owned){
    btn = sel
      ? `<span style="color:#ffe080;font-size:9px">✦ En jeu</span>`
      : `<button onclick="selectSkin('${id}')" style="background:none;border:1px solid #3a8a3a;color:#88cc88;padding:3px 10px;font-family:Courier New;font-size:9px;cursor:pointer;margin-top:2px">ÉQUIPER</button>`;
  } else if(isDaily){
    const req=DAILY_REWARDS.find(r=>r.skinId===id);
    const daysLeft = req ? Math.max(0, req.day - loginStreak) : '?';
    btn = daysLeft===0
      ? `<span style="color:#c8a000;font-size:8px">BIENTÔT</span>`
      : `<span style="color:#605040;font-size:8px">J+${daysLeft} restants</span>`;
  } else {
    btn = wallet>=sk.price
      ? `<button onclick="buySkin('${id}')" style="background:none;border:1px solid #c8a000;color:#ffe080;padding:3px 8px;font-family:Courier New;font-size:9px;cursor:pointer;margin-top:2px">✦${sk.price}</button>`
      : `<span style="color:#504040;font-size:9px">✦ ${sk.price}</span>`;
  }

  return `<div class="skin-card ${owned?'owned':''} ${sel?'selected':''} ${extraClass}" id="card_${id}">
    ${badge}
    <canvas id="prev_${id}" width="22" height="24" style="image-rendering:pixelated;width:44px;height:48px;"></canvas>
    <div class="skin-name">${sk.name}</div>
    ${btn}
  </div>`;
}

function renderPreviews(ids){
  for(const id of ids){
    const c2=document.getElementById('prev_'+id);
    if(!c2)continue;
    const cx=c2.getContext('2d');cx.imageSmoothingEnabled=false;
    cx.clearRect(0,0,22,24);
    drawGhostMini(cx,SKINS[id],1,0,2);
  }
}

function buySkin(id){
  const sk=SKINS[id];
  if(sk.price<0||wallet<sk.price||ownedSkins.includes(id))return;
  wallet-=sk.price;
  ownedSkins.push(id);
  selectedSkin=id;
  saveData();
  renderShop();
}
function selectSkin(id){
  if(!ownedSkins.includes(id))return;
  selectedSkin=id;
  saveData();
  renderShop();
}

    <div style="color:#ffe080;font-size:12px;margin-bottom:4px">+ ✦ ${sessionCoins} âmes récoltées</div>
    <div style="color:#806040;font-size:10px;margin-bottom:20px">Ton âme a trouvé la paix éternelle.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
      <button class="obtn" onclick="restart()" style="border-color:#ffc000;color:#ffe080;">☩ Rejouer</button>
      <button class="obtn gold" onclick="renderShop()">✦ Boutique</button>
    </div>
  `;
  o.style.display='flex';
}

function restart(){
  initGame();
  document.getElementById('overlay').style.display='none';
  gameRunning=true;
}

// ── START ──
// Vérifier connexion journalière avant d'afficher le menu
const dailyUnlocks = checkDailyLogin();
if(dailyUnlocks.length>0){
  showDailyPopup(dailyUnlocks);
} else {
  showMainMenu();
}
loop();

function showDailyPopup(unlocked){
  const o=document.getElementById('overlay');
  const cards=unlocked.map(r=>`
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(200,160,0,0.08);border:1px solid #c8a000;padding:12px 16px;">
      <canvas id="dprev_${r.skinId}" width="22" height="24" style="image-rendering:pixelated;width:44px;height:48px;"></canvas>
      <div style="color:#ffe080;font-size:10px;letter-spacing:1px">${SKINS[r.skinId].name}</div>
      <div style="color:#906830;font-size:8px">${r.desc}</div>
    </div>
  `).join('');

  o.innerHTML=`
    <div style="font-family:'UnifrakturMaguntia',cursive;color:#ffe080;font-size:38px;text-shadow:0 0 25px #c8a000;margin-top:40px;margin-bottom:4px">Connexion !</div>
    <div style="color:#c8a000;font-size:10px;letter-spacing:3px;margin-bottom:6px">RÉCOMPENSE JOURNALIÈRE</div>
    <div style="color:#ffe080;font-size:13px;margin-bottom:20px">🔥 Série : ${loginStreak} jour${loginStreak>1?'s':''}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:24px">${cards}</div>
    <div style="color:#806040;font-size:10px;margin-bottom:20px">Nouveau skin${unlocked.length>1?'s':''} débloqué${unlocked.length>1?'s':''}  !</div>
    <button class="obtn gold" onclick="showMainMenu()">✦ Continuer</button>
  `;
  o.style.display='flex';
  // previews
  setTimeout(()=>{
    for(const r of unlocked){
      const c2=document.getElementById('dprev_'+r.skinId);
      if(!c2)continue;
      const cx=c2.getContext('2d');cx.imageSmoothingEnabled=false;
      cx.clearRect(0,0,22,24);
      drawGhostMini(cx,SKINS[r.skinId],1,0,2);
    }
  },50);
}
</script>
</body>
</html>
